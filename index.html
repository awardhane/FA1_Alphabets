<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ABC Game">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fff3b0">
<title>ABC Letter Game for Little Learners</title>
<style>
  :root {
    --pink: #ff6b9d;
    --yellow: #ffd93d;
    --blue: #4dabf7;
    --green: #51cf66;
    --purple: #9775fa;
    --bg1: #fff3b0;
    --bg2: #a8e6cf;
  }
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    font-family: 'Comic Sans MS', 'Trebuchet MS', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    overflow: hidden;
    position: fixed;
    overscroll-behavior: none;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }
  #app {
    height: 100%;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
    text-align: center;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .card {
    background: #ffffffee;
    border-radius: 32px;
    padding: 32px 24px;
    box-shadow: 0 12px 0 rgba(0,0,0,0.08), 0 20px 40px rgba(0,0,0,0.15);
    max-width: 720px;
    width: 100%;
    margin: auto;
  }
  h1 {
    font-size: clamp(28px, 5vw, 48px);
    color: #ff4d6d;
    margin: 0 0 8px;
    text-shadow: 2px 2px 0 #fff;
  }
  .subtitle {
    font-size: clamp(16px, 2.5vw, 22px);
    color: #555;
    margin-bottom: 24px;
  }
  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    touch-action: manipulation;
  }
  .big-btn {
    background: var(--pink);
    color: white;
    font-size: 26px;
    font-weight: bold;
    padding: 20px 48px;
    min-height: 64px;
    border-radius: 50px;
    box-shadow: 0 8px 0 #c9497a;
    transition: transform 0.1s;
  }
  .big-btn:active {
    transform: translateY(6px);
    box-shadow: 0 2px 0 #c9497a;
  }
  .progress {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .star {
    font-size: 30px;
    filter: grayscale(1) opacity(0.4);
    transition: all 0.3s;
  }
  .star.filled {
    filter: none;
    transform: scale(1.2);
  }
  .question {
    font-size: clamp(20px, 3.5vw, 28px);
    color: #333;
    margin-bottom: 20px;
    font-weight: bold;
  }
  .objects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .object-tile {
    background: #fff9db;
    border-radius: 20px;
    padding: 14px 6px;
    border: 3px solid #ffe066;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .object-emoji {
    font-size: 48px;
  }
  .object-word {
    font-size: 16px;
    font-weight: bold;
    color: #555;
  }
  .speak-btn {
    background: none;
    font-size: 20px;
    margin-top: 2px;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .letter-options {
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .letter-btn {
    width: 88px;
    height: 88px;
    font-size: 40px;
    font-weight: bold;
    border-radius: 20px;
    background: var(--blue);
    color: white;
    box-shadow: 0 6px 0 #2f7bc7;
    transition: transform 0.1s;
  }
  .letter-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #2f7bc7; }
  .letter-btn.correct {
    background: var(--green) !important;
    box-shadow: 0 6px 0 #2f9e44 !important;
    animation: pop 0.4s;
  }
  .letter-btn.wrong {
    background: #ff6b6b !important;
    box-shadow: 0 6px 0 #c92a2a !important;
    animation: shake 0.4s;
  }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.25); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
  .feedback {
    font-size: 22px;
    font-weight: bold;
    min-height: 32px;
    margin-bottom: 10px;
  }
  .feedback.good { color: #2f9e44; }
  .feedback.bad { color: #e03131; }
  #confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 5;
  }
  .confetti-piece {
    position: absolute;
    top: -20px;
    font-size: 24px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(360deg); opacity: 0.8; }
  }
  .hidden { display: none !important; }
  .mascot {
    font-size: 50px;
    margin-bottom: 6px;
  }

  @media (orientation: portrait) {
    .objects-grid { grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); }
  }
</style>
</head>
<body>
<div id="confetti"></div>
<div id="app">

  <!-- START SCREEN -->
  <div class="card" id="startScreen">
    <div class="mascot">🦁📚🐥</div>
    <h1>ABC Picture Game!</h1>
    <p class="subtitle">Look at the pictures and guess the letter they start with!</p>
    <button class="big-btn" onclick="startGame()">▶ Start</button>
  </div>

  <!-- GAME SCREEN -->
  <div class="card hidden" id="gameScreen">
    <div class="progress" id="progressStars"></div>
    <div class="question" id="questionText">These pictures all start with which letter?</div>
    <div class="objects-grid" id="objectsGrid"></div>
    <div class="letter-options" id="letterOptions"></div>
    <div class="feedback" id="feedback"></div>
    <button class="big-btn hidden" id="nextBtn" onclick="nextRound()">Next ➜</button>
  </div>

  <!-- END SCREEN -->
  <div class="card hidden" id="endScreen">
    <div class="mascot">🎉🏆🎉</div>
    <h1>Great Job!</h1>
    <p class="subtitle" id="finalScoreText"></p>
    <button class="big-btn" onclick="restartGame()">🔁 Play Again</button>
  </div>

</div>

<script>
const LETTERS_DATA = {
  A: [
    { word: "Apple", emoji: "🍎" },
    { word: "Ant", emoji: "🐜" },
    { word: "Airplane", emoji: "✈️" },
    { word: "Alligator", emoji: "🐊" },
    { word: "Arrow", emoji: "➡️" }
  ],
  B: [
    { word: "Ball", emoji: "⚽" },
    { word: "Banana", emoji: "🍌" },
    { word: "Bear", emoji: "🐻" },
    { word: "Butterfly", emoji: "🦋" },
    { word: "Balloon", emoji: "🎈" }
  ],
  C: [
    { word: "Cat", emoji: "🐱" },
    { word: "Car", emoji: "🚗" },
    { word: "Cake", emoji: "🎂" },
    { word: "Cloud", emoji: "☁️" },
    { word: "Cow", emoji: "🐮" }
  ],
  D: [
    { word: "Dog", emoji: "🐶" },
    { word: "Duck", emoji: "🦆" },
    { word: "Drum", emoji: "🥁" },
    { word: "Donut", emoji: "🍩" },
    { word: "Dolphin", emoji: "🐬" }
  ]
};

const LETTER_ORDER = ["A", "B", "C", "D"];
let roundIndex = 0;
let score = 0;
let answered = false;
let shuffledLetters = [...LETTER_ORDER];
let speechUnlocked = false;

// iOS Safari requires speechSynthesis to be "unlocked" by a user-gesture
// utterance before it will reliably speak later, non-gesture-triggered text.
function unlockSpeech() {
  if (speechUnlocked || !('speechSynthesis' in window)) return;
  const warmup = new SpeechSynthesisUtterance('');
  window.speechSynthesis.speak(warmup);
  speechUnlocked = true;
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 0.85;
  utter.pitch = 1.2;
  window.speechSynthesis.speak(utter);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  unlockSpeech();
  roundIndex = 0;
  score = 0;
  shuffledLetters = shuffle(LETTER_ORDER);
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
  renderStars();
  loadRound();
}

function renderStars() {
  const starsEl = document.getElementById('progressStars');
  starsEl.innerHTML = '';
  for (let i = 0; i < LETTER_ORDER.length; i++) {
    const s = document.createElement('span');
    s.className = 'star' + (i < roundIndex ? ' filled' : '');
    s.textContent = '⭐';
    starsEl.appendChild(s);
  }
}

function loadRound() {
  answered = false;
  const feedback = document.getElementById('feedback');
  feedback.textContent = '';
  feedback.className = 'feedback';
  document.getElementById('nextBtn').classList.add('hidden');

  const currentLetter = shuffledLetters[roundIndex];
  const objects = LETTERS_DATA[currentLetter];

  const grid = document.getElementById('objectsGrid');
  grid.innerHTML = '';
  objects.forEach(obj => {
    const tile = document.createElement('div');
    tile.className = 'object-tile';
    tile.innerHTML = `
      <div class="object-emoji">${obj.emoji}</div>
      <div class="object-word">${obj.word}</div>
      <button class="speak-btn" onclick="speak('${obj.word}')">🔊</button>
    `;
    grid.appendChild(tile);
  });

  const optionsEl = document.getElementById('letterOptions');
  optionsEl.innerHTML = '';
  const options = shuffle(LETTER_ORDER);
  options.forEach(letter => {
    const btn = document.createElement('button');
    btn.className = 'letter-btn';
    btn.textContent = letter;
    btn.onclick = () => checkAnswer(letter, currentLetter, btn);
    optionsEl.appendChild(btn);
  });

  speak("These pictures all start with which letter?");
  renderStars();
}

function checkAnswer(chosen, correctLetter, btnEl) {
  if (answered) return;
  const feedback = document.getElementById('feedback');

  if (chosen === correctLetter) {
    answered = true;
    score++;
    btnEl.classList.add('correct');
    feedback.textContent = "🎉 Yes! That's the letter " + correctLetter + "!";
    feedback.className = 'feedback good';
    speak("Yes! That is the letter " + correctLetter);
    launchConfetti();
    document.getElementById('nextBtn').classList.remove('hidden');
  } else {
    btnEl.classList.add('wrong');
    feedback.textContent = "🤔 Try again!";
    feedback.className = 'feedback bad';
    speak("Try again!");
    setTimeout(() => btnEl.classList.remove('wrong'), 400);
  }
}

function nextRound() {
  roundIndex++;
  if (roundIndex >= shuffledLetters.length) {
    finishGame();
  } else {
    loadRound();
  }
}

function finishGame() {
  renderStars();
  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.remove('hidden');
  document.getElementById('finalScoreText').textContent =
    `You learned all your letters from A to D! Great work! 🌟`;
  speak("Wonderful job! You finished the alphabet game!");
  launchConfetti(40);
}

function restartGame() {
  startGame();
}

function launchConfetti(count = 24) {
  const container = document.getElementById('confetti');
  const emojis = ['🎉','✨','🌟','🎈','🎊'];
  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.animationDuration = (2 + Math.random() * 2) + 's';
    container.appendChild(piece);
    setTimeout(() => piece.remove(), 4000);
  }
}
</script>
</body>
</html>
